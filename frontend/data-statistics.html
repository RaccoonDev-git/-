<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 学情分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', '微软雅黑', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .navbar h1 {
            font-size: 24px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 图表网格 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="navbar">
            <h1><i class="fas fa-chart-bar"></i> 数据统计与报表</h1>
            <a href="admin.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> 返回控制台
            </a>
        </div>

        <!-- 统计概览 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="avg-score">-</div>
                <div class="stat-label">平均成绩</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-grades">-</div>
                <div class="stat-label">成绩记录数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="active-courses">-</div>
                <div class="stat-label">活跃课程数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="enrollment-count">-</div>
                <div class="stat-label">选课记录数</div>
            </div>
        </div>

        <!-- 图表展示 -->
        <div class="charts-grid">
            <!-- 成绩分布图 -->
            <div class="chart-card">
                <div class="chart-title">
                    <i class="fas fa-chart-pie"></i>
                    成绩分布
                </div>
                <div class="chart-container">
                    <canvas id="gradeDistributionChart"></canvas>
                </div>
            </div>

            <!-- 课程成绩对比 -->
            <div class="chart-card">
                <div class="chart-title">
                    <i class="fas fa-chart-bar"></i>
                    课程平均成绩
                </div>
                <div class="chart-container">
                    <canvas id="courseAvgChart"></canvas>
                </div>
            </div>

            <!-- 学期成绩趋势 -->
            <div class="chart-card">
                <div class="chart-title">
                    <i class="fas fa-chart-line"></i>
                    学期成绩趋势
                </div>
                <div class="chart-container">
                    <canvas id="semesterTrendChart"></canvas>
                </div>
            </div>

            <!-- 教师授课统计 -->
            <div class="chart-card">
                <div class="chart-title">
                    <i class="fas fa-chalkboard-teacher"></i>
                    教师授课数量
                </div>
                <div class="chart-container">
                    <canvas id="teacherCoursesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8082/api';

        // 检查管理员权限
        function checkAdmin() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return false;
            }

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.role !== 'ADMIN') {
                    alert('无权访问此页面');
                    window.location.href = '/admin.html';
                    return false;
                }
                return true;
            } catch (error) {
                console.error('解析token失败:', error);
                window.location.href = '/index.html';
                return false;
            }
        }

        // 获取token和headers
        function getHeaders() {
            return {
                'Authorization': `Bearer ${localStorage.getItem('token')}`,
                'Content-Type': 'application/json'
            };
        }

        // 加载统计数据
        async function loadStatistics() {
            try {
                const headers = getHeaders();

                // 获取成绩数据
                const gradesRes = await fetch(`${API_BASE_URL}/grades`, { headers });
                const grades = await gradesRes.json();

                // 获取课程数据
                const coursesRes = await fetch(`${API_BASE_URL}/courses`, { headers });
                const courses = await coursesRes.json();

                // 获取选课数据
                const enrollmentsRes = await fetch(`${API_BASE_URL}/enrollments`, { headers });
                const enrollments = await enrollmentsRes.json();

                // 计算统计数据
                const avgScore = grades.length > 0 
                    ? (grades.reduce((sum, g) => sum + g.score, 0) / grades.length).toFixed(2)
                    : 0;

                document.getElementById('avg-score').textContent = avgScore;
                document.getElementById('total-grades').textContent = grades.length;
                document.getElementById('active-courses').textContent = courses.filter(c => c.status === 'ACTIVE').length;
                document.getElementById('enrollment-count').textContent = enrollments.length;

                // 绘制图表
                drawGradeDistribution(grades);
                drawCourseAverage(grades, courses);
                drawSemesterTrend(courses, grades);
                drawTeacherCourses(courses);

            } catch (error) {
                console.error('加载统计数据失败:', error);
                alert('加载数据失败: ' + error.message);
            }
        }

        // 绘制成绩分布图
        function drawGradeDistribution(grades) {
            const ranges = {
                '优秀(90-100)': 0,
                '良好(80-89)': 0,
                '中等(70-79)': 0,
                '及格(60-69)': 0,
                '不及格(<60)': 0
            };

            grades.forEach(g => {
                if (g.score >= 90) ranges['优秀(90-100)']++;
                else if (g.score >= 80) ranges['良好(80-89)']++;
                else if (g.score >= 70) ranges['中等(70-79)']++;
                else if (g.score >= 60) ranges['及格(60-69)']++;
                else ranges['不及格(<60)']++;
            });

            const ctx = document.getElementById('gradeDistributionChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(ranges),
                    datasets: [{
                        data: Object.values(ranges),
                        backgroundColor: [
                            'rgba(67, 233, 123, 0.8)',
                            'rgba(79, 172, 254, 0.8)',
                            'rgba(240, 147, 251, 0.8)',
                            'rgba(255, 165, 0, 0.8)',
                            'rgba(255, 100, 100, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    }
                }
            });
        }

        // 绘制课程平均成绩图
        function drawCourseAverage(grades, courses) {
            const courseAvg = {};
            
            courses.forEach(c => {
                const courseGrades = grades.filter(g => g.courseId === c.id);
                if (courseGrades.length > 0) {
                    courseAvg[c.name] = courseGrades.reduce((sum, g) => sum + g.score, 0) / courseGrades.length;
                }
            });

            const ctx = document.getElementById('courseAvgChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(courseAvg).slice(0, 10),
                    datasets: [{
                        label: '平均成绩',
                        data: Object.values(courseAvg).slice(0, 10),
                        backgroundColor: 'rgba(79, 172, 254, 0.8)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        // 绘制学期成绩趋势图
        function drawSemesterTrend(courses, grades) {
            const semesterAvg = {};
            
            courses.forEach(c => {
                if (c.semester) {
                    const courseGrades = grades.filter(g => g.courseId === c.id);
                    if (courseGrades.length > 0) {
                        if (!semesterAvg[c.semester]) semesterAvg[c.semester] = [];
                        courseGrades.forEach(g => semesterAvg[c.semester].push(g.score));
                    }
                }
            });

            const avgData = Object.keys(semesterAvg).sort().map(s => {
                const scores = semesterAvg[s];
                return scores.reduce((sum, score) => sum + score, 0) / scores.length;
            });

            const ctx = document.getElementById('semesterTrendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(semesterAvg).sort(),
                    datasets: [{
                        label: '平均成绩',
                        data: avgData,
                        borderColor: 'rgba(67, 233, 123, 1)',
                        backgroundColor: 'rgba(67, 233, 123, 0.2)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        // 绘制教师授课统计图
        function drawTeacherCourses(courses) {
            const teacherCount = {};
            
            courses.forEach(c => {
                const teacherName = c.teacherName || `教师${c.teacherId}`;
                teacherCount[teacherName] = (teacherCount[teacherName] || 0) + 1;
            });

            // 取前10名
            const sorted = Object.entries(teacherCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            const ctx = document.getElementById('teacherCoursesChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(([name]) => name),
                    datasets: [{
                        label: '课程数量',
                        data: sorted.map(([, count]) => count),
                        backgroundColor: 'rgba(240, 147, 251, 0.8)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        y: {
                            ticks: { color: '#fff' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAdmin()) {
                loadStatistics();
            }
        });
    </script>
</body>
</html>
